name: GSR Morning Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: gsr-morning-run
  cancel-in-progress: false

jobs:
  run-gsr:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      GSR_DISABLE_SOCIAL_POSTS: "false"

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests python-dotenv tweepy
          fi

      - name: Confirm runtime configuration
        run: |
          pwd
          ls -la
          if [ -n "$ODDS_API_KEY" ]; then
            echo "ODDS_API_KEY is available to this workflow."
          else
            echo "ODDS_API_KEY is NOT available to this workflow."
            exit 1
          fi

      - name: Run master runner
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          echo "BETTING BLOCK START"
          python master_runner.py
          echo "BETTING BLOCK FINISH"

      - name: Publish live report to Vercel Blob
        env:
          GSR_PUSH_TOKEN: ${{ secrets.GSR_PUSH_TOKEN }}
          GSR_PUSH_URL: ${{ secrets.GSR_PUSH_URL }}
        run: |
          if [ -z "$GSR_PUSH_TOKEN" ] || [ -z "$GSR_PUSH_URL" ]; then
            echo "Skipping Blob publish because GSR_PUSH_TOKEN or GSR_PUSH_URL is missing."
            exit 0
          fi

          if [ ! -f public/latest_report.json ]; then
            echo "public/latest_report.json is missing."
            exit 1
          fi

          python -c "import json, pathlib; p=pathlib.Path('public/latest_report.json'); t=p.read_text(encoding='utf-8', errors='ignore'); d=json.loads(t); cards=d.get('homepage_cards') or d.get('cards') or []; bad=['books wait on prices','board takes shape','market takes shape','lines take shape','fallback','generic','placeholder']; hits=[x for x in bad if x in t.lower()]; assert len(cards) >= 8, f'Refusing to publish weak Betting report: only {len(cards)} cards'; assert not hits, f'Refusing to publish weak Betting report: found {hits}'; print('Betting report passed Blob publish gate.')"

          curl -sS --fail -X POST "$GSR_PUSH_URL" -H "Authorization: Bearer $GSR_PUSH_TOKEN" -H "Content-Type: application/json" --data-binary @public/latest_report.json

      - name: Guard betting report quality before commit
        shell: pwsh
        run: |
          Copy-Item .\latest_report.json .\public\latest_report.json -Force
          python scripts\check_betting_agent.py


      - name: Stage website files
        run: |
          git add public/latest_report.json public/latest_report.txt latest_report.json latest_report.txt betting_odds_report.json betting_odds_report.txt || true

      - name: Commit updated site data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "No site-data changes to commit."
          else
            git commit -m "Auto update GSR betting site data"
          fi

      - name: Push changes
        run: |
          git pull --rebase origin master || true
          if git diff --cached --quiet && git diff --quiet; then
            echo "Nothing to push."
          else
            git push origin HEAD:master
          fi
